name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate — index.html
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify index.html exists and is not empty
        run: |
          if [ ! -f "index.html" ]; then
            echo "ERROR: index.html not found in repository root"
            exit 1
          fi

          FILE_SIZE=$(wc -c < "index.html")
          echo "index.html size: ${FILE_SIZE} bytes"

          if [ "$FILE_SIZE" -lt 100 ]; then
            echo "ERROR: index.html is empty or too small (${FILE_SIZE} bytes)"
            exit 1
          fi

          echo "OK: index.html validated successfully (${FILE_SIZE} bytes)"

      - name: Check HTML structure
        run: |
          if ! grep -q "<!DOCTYPE html>" index.html && ! grep -qi "<html" index.html; then
            echo "WARNING: index.html may not be a valid HTML file"
          else
            echo "OK: HTML document structure detected"
          fi

  deploy:
    name: Deploy — GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report deployment URL
        run: |
          echo "Deployment successful"
          echo "URL: ${{ steps.deployment.outputs.page_url }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
